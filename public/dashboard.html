<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard | Smart TO-DO Manager</title>
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<div class="app-layout">

  <!-- ===================== SIDEBAR ===================== -->
  <aside class="sidebar glass">
    <div class="brand">✅ TO-DO Manager</div>

    <div class="nav-item active" data-section="dashboard">📊 Dashboard</div>
    <div class="nav-item" data-section="tasks">🗂️ Tasks</div>
    <div class="nav-item" data-section="activity">📜 Activity</div>
    <div class="nav-item" id="logoutBtn">🚪 Logout</div>

    <div class="clock-box glass">
      <div class="time" id="liveClock">00:00:00</div>
      <div class="date" id="liveDate">--</div>
    </div>
  </aside>

  <!-- ===================== MAIN CONTENT ===================== -->
  <main class="main-content">

    <div class="topbar">
      <div>
        <h2 id="welcomeTitle">Welcome!</h2>
        <div class="welcome-sub">Here's what's happening with your tasks today.</div>
      </div>
      <button class="btn small" id="openAddTaskBtn">＋ Add Task</button>
    </div>

    <!-- ---------------- STAT CARDS ---------------- -->
    <div class="stats-grid">
      <div class="stat-card glass">
        <div class="label">Total Tasks</div>
        <div class="value" id="statTotal">0</div>
      </div>
      <div class="stat-card glass">
        <div class="label">Completed</div>
        <div class="value completed" id="statCompleted">0</div>
      </div>
      <div class="stat-card glass">
        <div class="label">Pending</div>
        <div class="value" id="statPending">0</div>
      </div>
      <div class="stat-card glass">
        <div class="label">Overdue</div>
        <div class="value overdue" id="statOverdue">0</div>
      </div>
      <div class="stat-card glass">
        <div class="label">High Priority</div>
        <div class="value high" id="statHigh">0</div>
      </div>
    </div>

    <!-- ---------------- PROGRESS BAR ---------------- -->
    <div class="progress-wrap glass">
      <div class="top-row">
        <span>Productivity</span>
        <span id="productivityLabel">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="content-grid">
      <!-- ---------------- TASKS PANEL ---------------- -->
      <div>
        <div class="panel glass">
          <div class="panel-header">
            <h3>My Tasks</h3>
          </div>

          <div class="controls-row">
            <div class="search-box">
              <input type="text" id="searchInput" placeholder="Quick search tasks... (Ctrl+K)" />
            </div>
            <select id="priorityFilter">
              <option value="All">All Priorities</option>
              <option value="High">High</option>
              <option value="Medium">Medium</option>
              <option value="Low">Low</option>
            </select>
            <select id="statusFilter">
              <option value="All">All Status</option>
              <option value="Pending">Pending</option>
              <option value="Completed">Completed</option>
              <option value="Overdue">Overdue</option>
            </select>
            <select id="sortFilter">
              <option value="newest">Newest</option>
              <option value="priority">Priority</option>
              <option value="dueDate">Due Date</option>
            </select>
          </div>

          <div class="task-list" id="taskList">
            <div class="loader"></div>
          </div>

          <div class="kbd-hint">Shortcuts: <kbd>Ctrl</kbd>+<kbd>K</kbd> search &nbsp; <kbd>Ctrl</kbd>+<kbd>N</kbd> new task</div>
        </div>
      </div>

      <!-- ---------------- SIDE PANEL: ACTIVITY + NOTIFICATIONS ---------------- -->
      <div>
        <div class="panel glass">
          <div class="panel-header"><h3>Activity Timeline</h3></div>
          <div class="timeline" id="timelineList">
            <div class="loader"></div>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>

<!-- ===================== ADD / EDIT TASK MODAL ===================== -->
<div class="modal-overlay" id="taskModal">
  <div class="modal-box glass">
    <h3 id="modalTitle">Add New Task</h3>
    <form id="taskForm">
      <input type="hidden" id="taskId" />
      <div class="form-row">
        <label>Task Title</label>
        <input type="text" id="taskTitle" placeholder="e.g. Java Assignment" required />
      </div>
      <div class="form-row">
        <label>Description</label>
        <textarea id="taskDescription" placeholder="Add details..."></textarea>
      </div>
      <div class="form-row">
        <label>Priority</label>
        <select id="taskPriority">
          <option value="High">High</option>
          <option value="Medium" selected>Medium</option>
          <option value="Low">Low</option>
        </select>
      </div>
      <div class="form-row">
        <label>Due Date</label>
        <input type="datetime-local" id="taskDueDate" />
      </div>
      <div class="modal-actions">
        <button type="button" class="btn secondary" id="cancelModalBtn">Cancel</button>
        <button type="submit" class="btn" id="saveTaskBtn">Save Task</button>
      </div>
    </form>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="/js/dashboard.js"></script>
</body>
</html>
